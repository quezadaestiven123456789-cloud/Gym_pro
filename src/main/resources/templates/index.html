<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="layout/plantilla :: head">
    <title>Control de Personas</title>

</head>
<body>
    <header th:replace="layout/plantilla :: header"></header>

    <a sec:authorize="hasRole('ROLE_ADMIN')" th:href="@{/agregar}">[[#{persona.crear}]]</a>

    <div th:if="${personas != null and !personas.empty}">
        <table border="1">
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Email</th>
                <th>Telefono</th>
                <th sec:authorize="hasRole('ROLE_ADMIN')">[[#{accion.editar}]]</th>
                <th sec:authorize="hasRole('ROLE_ADMIN')">[[#{accion.eliminar}]]</th>
            </tr>
            <tr th:each="persona : ${personas}">
                <td th:text="${persona.nombre}"></td>
                <td th:text="${persona.apellido}"></td>
                <td th:text="${persona.email}"></td>
                <td th:text="${persona.telefono}"></td>
                <td sec:authorize="hasRole('ROLE_ADMIN')"><a th:href="@{/editar/{idPersona}(idPersona=${persona.idPersona})}">[[#{accion.editar}]]</a></td>
                <td sec:authorize="hasRole('ROLE_ADMIN')"><a th:href="@{/eliminar/{idPersona}(idPersona=${persona.idPersona})}">[[#{accion.eliminar}]]</a></td>
            </tr>
        </table>
    </div>
    <div th:if="${personas == null or personas.empty}">
        [[#{persona.lista-vacia}]]
    </div>

    <footer th:replace="layout/plantilla :: footer"></footer>
</body>
</html>
