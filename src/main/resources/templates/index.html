<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Control de Personas</title>
</head>
<body>
    <header th:replace="layout/plantilla :: header"></header>

    <h1>Control de Personas</h1>

    <a th:href="@{/agregar}">
        <button>[[#{persona.crear}]]</button>
    </a>

    <br/><br/>

    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>[[#{persona.nombre}]]</th>
                <th>[[#{persona.apellido}]]</th>
                <th>[[#{persona.email}]]</th>
                <th>[[#{persona.telefono}]]</th>
                <th>[[#{accion.editar}]]</th>
                <th>[[#{accion.eliminar}]]</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="persona : ${personas}">
                <td th:text="${persona.idPersona}">1</td>
                <td th:text="${persona.nombre}">Nombre</td>
                <td th:text="${persona.apellido}">Apellido</td>
                <td th:text="${persona.email}">email@example.com</td>
                <td th:text="${persona.telefono}">123456789</td>
                <td>
                    <a th:href="@{/editar/{id}(id=${persona.idPersona})}">[[#{accion.editar}]]</a>
                </td>
                <td>
                    <a th:href="@{/eliminar/{id}(id=${persona.idPersona})}">[[#{accion.eliminar}]]</a>
                </td>
            </tr>
        </tbody>
    </table>

    <footer th:replace="layout/plantilla :: footer"></footer>
</body>
</html>
